name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests and frontend build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vpn_billing_testing
          POSTGRES_USER: vpn_billing
          POSTGRES_PASSWORD: vpn_billing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpn_billing -d vpn_billing_testing"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      APP_ENV: testing
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: vpn_billing_testing
      DB_USERNAME: vpn_billing
      DB_PASSWORD: vpn_billing
      REDIS_HOST: 127.0.0.1
      REDIS_PASSWORD: null

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, intl, mbstring, pcntl, pdo_pgsql, redis, sockets, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test --env=testing
