name: Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          target: app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-app:latest
            ghcr.io/${{ github.repository }}-app:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          target: nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-nginx:latest
            ghcr.io/${{ github.repository }}-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,scope=nginx,mode=max
