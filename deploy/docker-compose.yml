name: vpn-billing

services:
  app:
    image: ghcr.io/rrmini1/vpn-billing-app:latest
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - billing

  nginx:
    image: ghcr.io/rrmini1/vpn-billing-nginx:latest
    depends_on:
      - app
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    networks:
      - billing

  queue:
    image: ghcr.io/rrmini1/vpn-billing-app:latest
    command: php artisan queue:work --tries=1 --timeout=120 --sleep=1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - billing

  scheduler:
    image: ghcr.io/rrmini1/vpn-billing-app:latest
    command: php artisan schedule:work
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - billing

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vpn_billing}
      POSTGRES_USER: ${DB_USERNAME:-vpn_billing}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - billing

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - billing

networks:
  billing:
    driver: bridge

volumes:
  postgres-data:
