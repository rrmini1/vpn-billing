name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests and frontend build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vpn_billing_testing
          POSTGRES_USER: vpn_billing
          POSTGRES_PASSWORD: vpn_billing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpn_billing -d vpn_billing_testing"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      APP_ENV: testing
      APP_KEY: "base64:1mcPNLtaD314uQLfIqVaeRLFGLku8nPT2TElOzcrOMs="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8083
      FRONTEND_URL: http://localhost:5175
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:8083,localhost:5175,127.0.0.1,127.0.0.1:8083,127.0.0.1:5175
      CORS_ALLOWED_ORIGINS: http://localhost:8083,http://localhost:5175,http://127.0.0.1:8083,http://127.0.0.1:5175
      BCRYPT_ROUNDS: "4"
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: vpn_billing_testing
      DB_USERNAME: vpn_billing
      DB_PASSWORD: vpn_billing
      SESSION_DRIVER: array
      BROADCAST_CONNECTION: "null"
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: sync
      CACHE_STORE: array
      REDIS_HOST: 127.0.0.1
      REDIS_PASSWORD: "null"
      MAIL_MAILER: array
      TELEGRAM_BOT_TOKEN: test-telegram-bot-token
      TELEGRAM_AUTH_MAX_AGE: "86400"
      MARZBAN_BASE_URL: https://panel.cors-port.ru
      MARZBAN_USERNAME: test-marzban-admin
      MARZBAN_PASSWORD: test-marzban-password
      MARZBAN_TIMEOUT: "10"
      MARZBAN_PROXY_TYPE: vless
      MARZBAN_INBOUND: "VLESS TCP REALITY"
      MARZBAN_DATA_LIMIT_RESET_STRATEGY: no_reset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, intl, mbstring, pcntl, pdo_pgsql, redis, sockets, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test --env=testing
