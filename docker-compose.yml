name: vpn-billing

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    image: vpn-billing-php:dev
    working_dir: /application
    volumes:
      - .:/application
      - composer-cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn-billing

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8083}:80"
    volumes:
      - .:/application:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - vpn-billing

  postgres:
    image: postgres:17-alpine
    ports:
      - "${DB_FORWARD_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vpn_billing}
      POSTGRES_USER: ${DB_USERNAME:-vpn_billing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpn_billing}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - vpn-billing

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6381}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-vpn_billing}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vpn_billing}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - vpn-billing

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${MAILHOG_FORWARD_PORT:-8025}:8025"
    networks:
      - vpn-billing

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    image: vpn-billing-php:dev
    working_dir: /application
    command: php artisan queue:work --tries=1 --timeout=120 --sleep=1
    volumes:
      - .:/application
      - composer-cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      XDEBUG_MODE: off
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vpn-billing

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    image: vpn-billing-php:dev
    working_dir: /application
    command: php artisan schedule:work
    volumes:
      - .:/application
      - composer-cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      XDEBUG_MODE: off
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vpn-billing

  vite:
    image: node:24-alpine
    working_dir: /application
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5175}
    ports:
      - "${VITE_FORWARD_PORT:-5175}:5173"
    volumes:
      - .:/application
      - node-modules:/application/node_modules
    networks:
      - vpn-billing

networks:
  vpn-billing:
    driver: bridge

volumes:
  composer-cache:
  postgres-data:
  node-modules:
